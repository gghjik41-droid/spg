<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Опросники</title>

    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="apple-touch-icon" sizes="152x152" href="favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="favicon.png">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="index.css">
</head>
<body>

<div id="loader-wrapper">
    <div class="loader"></div>
    <div class="loader-text">Загрузка задачи...</div>
</div>

<div id="update-banner">
    <span>Доступно обновление приложения</span>
    <button onclick="applyUpdate()">Обновить</button>
    <button onclick="dismissUpdate()">Отложить</button>
    <span class="update-warning">⚠️ Не нажимайте при плохой связи</span>
</div>

<div class="header-nav" id="menu">
    <div style="display: flex; gap: 5px; justify-self: start;">
        <button class="clear-btn" onclick="clearAllData()" title="Полная очистка">✕</button>
        <button class="pin-btn active" id="master-pin-btn" onclick="togglePin()" title="Закрепить/открепить шапку заявки">📌</button>
    </div>

    <div style="display: flex; gap: 5px; justify-content: center;">
        <button class="nav-btn active" onclick="openSurvey('npcr.html', this)">НА ПСР</button>
        <button class="nav-btn" onclick="openSurvey('molitva.html', this)">МОЛИТВА</button>
        <button class="nav-btn" onclick="openSurvey('pamyatki.html', this)">ПАМЯТКИ</button>
        <button class="nav-btn" onclick="openSurvey('opros.html', this)">ОПРОС</button>
        <!-- <button class="nav-btn" onclick="openSurvey('222222.html', this)">222222</button> -->
    </div>

    <div style="display: flex; gap: 5px; justify-self: end; padding-right: 10px; align-items: center;">
        <button class="nav-btn" onclick="exportToJson()" title="Выгрузить JSON">💾</button>
        <button class="nav-btn" onclick="document.getElementById('import-file').click()" title="Загрузить JSON">📂</button>
        <input type="file" id="import-file" style="display:none" onchange="importFromJson(this)" accept=".json">
        <span id="online-status" style="display: none; width: 10px; height: 10px; border-radius: 50%; background: #4caf50; flex-shrink: 0;" title="Онлайн"></span>
        <span id="offline-status" style="display: none; width: 10px; height: 10px; border-radius: 50%; background: #f44336; flex-shrink: 0;" title="Офлайн"></span>
    </div>
</div>

<div class="main-wrapper">
    <div class="form-side">
        <iframe src="npcr.html?v=1" id="survey-frame" scrolling="no"></iframe>
    </div>

    <div class="result-side">
        <button class="btn-copy" id="copy-btn" onclick="copyText()">
            <span>Скопировать результат</span>
            <span id="save-status">Обновлено: --:--:--</span>
        </button>
        <div id="output">Результат опроса появится здесь...</div>
    </div>
</div>

<script>
    // --- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ---
    var ORDER = ['npcr', 'molitva', 'pamyatki', 'opros', '222222'];
    var globalZData = localStorage.getItem('pso_z_main') || "";
    var globalCallsignData = localStorage.getItem('pso_global_callsign_data') || ""; 
    var globalFields = JSON.parse(localStorage.getItem('pso_global_fields') || "{}"); 

    var currentSource = localStorage.getItem('last_survey_file') ? localStorage.getItem('last_survey_file').replace('.html', '') : 'npcr';
    var scrollTimeout;

    /**
     * Показывает или скрывает экран загрузки
     */
    function toggleLoader(show) {
        const loader = document.getElementById('loader-wrapper');
        if (loader) {
            if (show) loader.classList.remove('loader-hidden');
            else loader.classList.add('loader-hidden');
        }
    }

    /**
     * Подстраивает верхний отступ фрейма (анкеты).
     */
    function adjustFrameOffset() {
        var header = document.getElementById('master-sticky');
        var frame = document.getElementById('survey-frame');
        if (header && frame && !header.classList.contains('unpinned') && window.innerWidth > 900) {
            frame.style.marginTop = (header.offsetHeight + 10) + 'px';
        } else {
            if (frame) frame.style.marginTop = '0px';
        }
    }

    /**
     * Переключает состояние закрепления шапки (Pin).
     */
    function togglePin() {
        var btn = document.getElementById('master-pin-btn');
        var header = document.getElementById('master-sticky');
        if (!btn || !header) return;
        
        var isActive = btn.classList.toggle('active');
        header.classList.toggle('unpinned', !isActive);
        localStorage.setItem('pso_header_pinned', isActive);
        adjustFrameOffset();
    }

    /**
     * Применяет изменения в поле "Z".
     */
    function fixZ() {
        var val = document.getElementById('z_text').value; 
        globalZData = val;
        localStorage.setItem('pso_z_main', val);
        if (val.trim() !== "") {
            renderZ(val);
        }
    }

    /**
     * Рендерит Z-текст.
     */
    function renderZ(text) {
        var valDiv = document.getElementById('z_value');
        if (!valDiv) return;
        
        var flatText = text.trim().split('\n')
            .filter(line => line.trim() !== "") 
            .join(' | '); 
        
        valDiv.innerText = flatText; 

        if(document.getElementById('z_text')) document.getElementById('z_text').style.display = 'none';
        if(document.getElementById('z_confirm_btn')) document.getElementById('z_confirm_btn').style.display = 'none';
        if(document.getElementById('z_fixed')) document.getElementById('z_fixed').style.display = 'block';
        if(document.getElementById('z_edit_btn')) document.getElementById('z_edit_btn').style.display = 'block';
        
        setTimeout(adjustFrameOffset, 30);
    }

    /**
     * Редактирование Z.
     */
    function editZ() {
        var zInput = document.getElementById('z_text');
        if(!zInput) return;
        zInput.value = globalZData;
        zInput.style.display = 'block';
        if(document.getElementById('z_confirm_btn')) document.getElementById('z_confirm_btn').style.display = 'block';
        if(document.getElementById('z_fixed')) document.getElementById('z_fixed').style.display = 'none';
        if(document.getElementById('z_edit_btn')) document.getElementById('z_edit_btn').style.display = 'none';
        setTimeout(adjustFrameOffset, 30);
    }

    /**
     * Передает данные внутрь <iframe>.
     */
    function broadcastData(call, fields) {
        var frame = document.getElementById('survey-frame');
        if (frame && frame.contentWindow) {
            frame.contentWindow.postMessage({ type: 'set_global_data', value: call, fields: fields }, '*');
        }
    }

    /**
     * Переключает анкеты.
     */
    function openSurvey(fileName, btn) {
        var frame = document.getElementById('survey-frame');
        if (!frame) return;
        
        // НЕ показываем лоадер при переключении
        currentSource = fileName.replace('.html', '');
        frame.src = fileName;
        var navBtns = document.querySelectorAll('.nav-btn');
        navBtns.forEach(function(b) { b.classList.remove('active'); });
        if (btn) btn.classList.add('active');
        localStorage.setItem('last_survey_file', fileName);

        frame.onload = function() {
            broadcastData(globalCallsignData, globalFields);
            adjustFrameOffset();
            updateFinalOutput();
            // Показать блок результата (по умолчанию)
            var resultSide = document.querySelector('.result-side');
            var btnCopy = document.getElementById('copy-btn');
            if (resultSide) resultSide.style.display = 'block';
            if (btnCopy) btnCopy.style.display = 'flex';
            // Скрываем после прогрузки фрейма
            setTimeout(() => toggleLoader(false), 200);
        };
    }

    /**
     * Полная очистка.
     */
    function clearAllData() {
        if (confirm("Очистить все формы и результат?")) {
            // Очистить IndexedDB в npcr.html
            var frame = document.getElementById('survey-frame');
            if (frame && frame.contentWindow) {
                frame.contentWindow.postMessage({ type: 'clear_db' }, '*');
            }
            localStorage.clear();
            location.reload();
        }
    }

    /**
     * Обновляет итоговый текстовый блок.
     */
    function updateFinalOutput() {
        var outDiv = document.getElementById('output');
        if (!outDiv) return;
        outDiv.innerHTML = ""; 

        var raw = localStorage.getItem('survey_text_' + currentSource);
        if (raw) {
            try {
                var payload = JSON.parse(raw);
                if (Array.isArray(payload)) {
                    payload.forEach(function(item, index) {
                        var row = document.createElement('div');
                        row.className = 'res-row';
                        row.id = 'row-' + currentSource + '-' + index;

                        if (item.isHeader) {
                            row.innerHTML = '<span class="res-value" style="font-weight:bold; display:block; margin-bottom:15px; font-size:1.1em; border-bottom:1px solid #444; padding-bottom:5px;">' + item.value + '</span>';
                        } 
                        else if (item.label && item.label.trim() !== "") {
                            row.innerHTML = '<span class="res-label">' + item.label + ':</span> <span class="res-value">' + item.value + '</span>';
                        } 
                        else {
                            row.innerHTML = '<span class="res-value">' + item.value + '</span>';
                        }
                        outDiv.appendChild(row);
                    });
                }
            } catch(e) { console.error("Ошибка отрисовки", e); }
        }
        var status = document.getElementById('save-status');
        if (status) {
            var now = new Date();
            var timeStr = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            status.innerText = "Обновлено в " + timeStr;
        }
    }

    /**
     * Слушатель postMessage.
     */
    window.addEventListener('message', function(event) {
        if (event.data.type === 'survey_update') {
            localStorage.setItem('survey_text_' + event.data.source, JSON.stringify(event.data.payload));
            if (event.data.source === currentSource) updateFinalOutput();
        }

        if (event.data.type === 'sync_scroll') {
            clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(function() {
                var targetId = 'row-' + event.data.source + '-' + event.data.index;
                var targetRow = document.getElementById(targetId);
                var outputBox = document.getElementById('output');
                if (targetRow && outputBox) {
                    document.querySelectorAll('.res-row').forEach(function(r) { r.classList.remove('active-focus'); });
                    targetRow.classList.add('active-focus');
                    var scrollTarget = targetRow.offsetTop - outputBox.offsetTop - (outputBox.clientHeight / 3);
                    outputBox.scrollTo({ top: scrollTarget, behavior: 'smooth' });
                }
            }, 100);
        }

        if (event.data.type === 'sync_globals') {
            if (globalCallsignData !== event.data.value) {
                globalCallsignData = event.data.value;
                localStorage.setItem('pso_global_callsign_data', globalCallsignData);
                updateFinalOutput(); 
            }
        }

        if (event.data.type === 'sync_field') {
            if (globalFields[event.data.fieldId] !== event.data.value) {
                globalFields[event.data.fieldId] = event.data.value;
                localStorage.setItem('pso_global_fields', JSON.stringify(globalFields));
                broadcastData(globalCallsignData, globalFields);
            }
        }

        if (event.data.type === 'set_height') {
            var frame = document.getElementById('survey-frame');
            if (frame && event.data.height) {
                frame.style.height = event.data.height + 'px';
                adjustFrameOffset();
            }
        }

        if (event.data.type === 'hide_result') {
            var resultSide = document.querySelector('.result-side');
            var btnCopy = document.getElementById('copy-btn');
            if (resultSide) resultSide.style.display = event.data.hide ? 'none' : 'block';
            if (btnCopy) btnCopy.style.display = event.data.hide ? 'none' : 'flex';
        }

        if (event.data.type === 'show_result') {
            var resultSide = document.querySelector('.result-side');
            var btnCopy = document.getElementById('copy-btn');
            if (resultSide) resultSide.style.display = 'block';
            if (btnCopy) btnCopy.style.display = 'flex';
        }
    });

    /**
     * Копирование (современный API).
     */
    async function copyText() {
        var out = document.getElementById('output');
        if (!out || out.innerText.indexOf('Результат опроса') === 0) return;

        var finalString = "";
        var elements = out.childNodes;
        elements.forEach(function(node) {
            if (node.nodeType === 1) { 
                var tempNode = node.cloneNode(true);
                var labels = tempNode.querySelectorAll('.res-label');
                labels.forEach(function(l) { l.style.textTransform = 'none'; });
                finalString += tempNode.innerText.trim() + "\n";
            }
        });

        var textToCopy = finalString.trim();

        // Пробуем современный API
        if (navigator.clipboard && navigator.clipboard.writeText) {
            try {
                await navigator.clipboard.writeText(textToCopy);
                showCopySuccess();
                return;
            } catch (err) {
                console.log('Clipboard API не сработал:', err);
            }
        }

        // Fallback для старых браузеров
        fallbackCopy(textToCopy);
        showCopySuccess();
    }

    function fallbackCopy(text) {
        var tempArea = document.createElement('textarea');
        tempArea.value = text;
        tempArea.style.position = 'fixed';
        tempArea.style.left = '-9999px';
        document.body.appendChild(tempArea);
        tempArea.select();
        try {
            document.execCommand('copy');
        } catch (err) {
            console.error('Fallback copy не сработал:', err);
        }
        document.body.removeChild(tempArea);
    }

    function showCopySuccess() {
        var btn = document.getElementById('copy-btn');
        if (btn) {
            var oldContent = btn.innerHTML;
            btn.innerHTML = "<span>СКОПИРОВАНО!</span>";
            btn.style.backgroundColor = "#00c853";
            setTimeout(function() { 
                btn.innerHTML = oldContent; 
                btn.style.backgroundColor = "#1976d2"; 
            }, 1200);
        }
    }

    /**
     * Инициализация.
     */
    window.onload = function() {
        var savedZ = localStorage.getItem('pso_z_main') || "";
        globalZData = savedZ;
        var zTextarea = document.getElementById('z_text');
        if(zTextarea) zTextarea.value = savedZ;

        // ЗАКОММЕНТИРОВАНО: Логика отрисовки Z при загрузке
        /*
        if (savedZ.trim() === "") { 
            editZ(); 
        } else { 
            renderZ(savedZ); 
        }
        */

        if (zTextarea) {
            const ro = new ResizeObserver(function() {
                adjustFrameOffset();
            });
            ro.observe(zTextarea);
        }

        var pinnedSetting = localStorage.getItem('pso_header_pinned');
        var pinBtn = document.getElementById('master-pin-btn');
        var stickyHeader = document.getElementById('master-sticky');

        if (pinnedSetting !== null && pinBtn && stickyHeader) {
            var isPinned = (pinnedSetting === 'true');
            pinBtn.classList.toggle('active', isPinned);
            stickyHeader.classList.toggle('unpinned', !isPinned);
        }

        var savedCall = localStorage.getItem('pso_global_callsign_data');
        if (savedCall === null) { 
            var now = new Date();
            var dateStr = now.toLocaleDateString('ru-RU');
            var timeStr = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            savedCall = dateStr + " " + timeStr + "\n";
            localStorage.setItem('pso_global_callsign_data', savedCall);
        }
        globalCallsignData = savedCall;

        var lastFile = localStorage.getItem('last_survey_file') || 'npcr.html';
        var buttons = document.querySelectorAll('.nav-btn');
        var found = false;
        buttons.forEach(function(btn) {
            if (btn.getAttribute('onclick') && btn.getAttribute('onclick').indexOf(lastFile) !== -1) {
                openSurvey(lastFile, btn);
                found = true;
            }
        });
        if(!found && buttons.length > 0) openSurvey('npcr.html', buttons[0]);

        updateFinalOutput();
        setTimeout(adjustFrameOffset, 150);

        // Индикатор онлайн/офлайн
        updateOnlineStatus();
        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);
    };

    function updateOnlineStatus() {
        var onlineEl = document.getElementById('online-status');
        var offlineEl = document.getElementById('offline-status');
        if (navigator.onLine) {
            if (onlineEl) onlineEl.style.display = 'block';
            if (offlineEl) offlineEl.style.display = 'none';
        } else {
            if (onlineEl) onlineEl.style.display = 'none';
            if (offlineEl) offlineEl.style.display = 'block';
        }
    }

    window.addEventListener('resize', adjustFrameOffset);

    function exportToJson() {
        try {
            var backup = {};
            var keys = Object.keys(localStorage);
            for (var i = 0; i < keys.length; i++) {
                var k = keys[i];
                if (k && (k.indexOf('survey_') === 0 || k.indexOf('pso_') === 0 || k === 'last_survey_file' || k === 'pso_last_gender')) {
                    backup[k] = localStorage.getItem(k);
                }
            }
            var callsign = localStorage.getItem('pso_global_callsign_data');
            var rawString = String(callsign || "pso_backup");
            var firstLine = String(rawString.split('\n')[0]);
            var safeName = firstLine.trim().replace(/[:.\/\\?%*|"<>]/g, '-').replace(/\s+/g, '_');
            if (!safeName) safeName = "pso_backup";

            var dataStr = JSON.stringify(backup, null, 2);
            var blob = new Blob([dataStr], {type: "application/json"});
            var url = URL.createObjectURL(blob);
            var link = document.createElement('a');
            link.href = url;
            link.download = safeName + ".json";
            document.body.appendChild(link);
            link.click();
            setTimeout(function() { document.body.removeChild(link); window.URL.revokeObjectURL(url); }, 100);
        } catch (e) { alert("Ошибка при сохранении: " + e.message); }
    }

    function importFromJson(el) {
        if (!el || !el.files || el.files.length === 0) return;
        var fileToLoad = el.files[0]; 
        var reader = new FileReader();
        reader.onload = function(e) {
            try {
                var data = JSON.parse(e.target.result);
                if (confirm("Заменить данные?")) {
                    localStorage.clear();
                    for (var key in data) { localStorage.setItem(key, data[key]); }
                    location.reload();
                }
            } catch (err) { alert("Ошибка файла"); }
        };
        reader.readAsText(fileToLoad);
        el.value = "";
    }

    window.addEventListener("drop", function(e) {
        e.preventDefault();
        var files = e.dataTransfer.files;
        if (files.length > 0) {
            var file = files[0];
            // Проверяем расширение и MIME-тип
            if (!file.name.endsWith('.json') && file.type !== 'application/json') {
                alert('Пожалуйста, выберите файл JSON');
                return;
            }
            importFromJson({ files: files });
        }
    }, false);

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
            navigator.serviceWorker.register('sw.js').then(function(reg) {
                console.log('ServiceWorker готов!', reg.scope);
            }).catch(function(err) {
                console.log('Ошибка SW:', err);
            });
        });

        // Слушаем сообщения от Service Worker
        navigator.serviceWorker.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'sw_updated') {
                showUpdateBanner();
            }
        });
    }

    // Показать баннер обновления
    function showUpdateBanner() {
        // Проверяем, не откладывал ли пользователь обновление
        var dismissed = localStorage.getItem('update_dismissed');
        if (dismissed) {
            var hoursPassed = (Date.now() - parseInt(dismissed)) / (1000 * 60 * 60);
            if (hoursPassed < 24) {
                // Менее 24 часов — не показываем
                return;
            }
        }
        
        var banner = document.getElementById('update-banner');
        if (banner) banner.style.display = 'flex';
    }

    // Отложить обновление на 24 часа
    function dismissUpdate() {
        localStorage.setItem('update_dismissed', Date.now());
        var banner = document.getElementById('update-banner');
        if (banner) banner.style.display = 'none';
    }

    // Применить обновление
    function applyUpdate() {
        // Убираем отметку об отклонении
        localStorage.removeItem('update_dismissed');
        
        navigator.serviceWorker.ready.then(function(reg) {
            reg.active.postMessage({ type: 'skipWaiting' });
        });
        // Перезагрузим страницу после краткой задержки
        setTimeout(function() {
            location.reload();
        }, 500);
    }
</script>


</body>
</html>
