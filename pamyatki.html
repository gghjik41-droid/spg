<script>
    // Переключение секций
    function toggleSection(section) {
        var block = document.getElementById('section-' + section);
        block.classList.toggle('open');
        sendHeight();
    }

    // Отправка высоты
    function sendHeight() {
        var height = document.documentElement.offsetHeight || document.body.scrollHeight;
        window.parent.postMessage({ type: 'set_height', height: height }, '*');
    }

    // Скрыть блок результата
    function hideResult() {
        window.parent.postMessage({ type: 'hide_result', hide: true }, '*');
    }

    // Инициализация
    window.onload = function() {
        hideResult();
        sendHeight();
    };
</script>
